name: Daily JD Fetch

on:
  schedule:
    - cron: "7 1 * * 1-5" # 08:07 VN (UTC+7), T2-T6; avoid GitHub Actions top-of-hour congestion
  workflow_dispatch:

jobs:
  fetch-jd:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: daily-jd-fetch
      cancel-in-progress: false
    permissions:
      contents: write # Allow committing data/seen_jobs.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch JD
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/fetch_jd.py

      - name: Commit seen jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
